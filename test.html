<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste visual — Editor IAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { margin: 0; background: #e8e2d8; font-family: var(--font-sans); color: var(--marinho); }
    .test-page { max-width: 1400px; margin: 0 auto; padding: 32px 24px 80px; }
    .test-page__head { margin-bottom: 40px; }
    .test-page__head h1 { font-family: var(--font-serif); font-size: 2rem; margin: 0 0 8px; }
    .test-page__head p { margin: 0; color: var(--grafite-2); line-height: 1.5; }
    .test-page__head a { margin-left: 12px; color: var(--estola); font-weight: 600; }
    .test-section { margin-bottom: 48px; padding-bottom: 32px; border-bottom: 1px solid var(--linha); }
    .test-section__title { font-family: var(--font-serif); font-size: 1.35rem; margin: 0 0 16px; display: flex; flex-wrap: wrap; gap: 12px; align-items: baseline; }
    .test-section__meta { font-family: var(--font-sans); font-size: 0.8rem; font-weight: 500; color: var(--grafite-3); }
    .test-row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; }
    @media (max-width: 900px) { .test-row { grid-template-columns: 1fr; } }
    .test-cell__label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--estola); margin: 0 0 8px; }
    .test-cell__frame { background: var(--vela); border-radius: 8px; padding: 12px; box-shadow: 0 4px 20px rgba(14, 42, 71, 0.08); overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="test-fixtures.js"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="templates.jsx"></script>
  <script type="text/babel" src="test-render.jsx"></script>
</body>
</html>
